services:
  # Node.js Server
  - type: web
    name: holowstreet-server
    env: node
    rootDir: packages/server
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: RENDER_DISK_PATH
        value: /data
    disk:
      name: data
      mountPath: /data
      sizeGB: 1

  # React Client
  - type: web
    name: holowstreet-client
    env: static
    rootDir: packages/client
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: holowstreet-server
          envVarKey: RENDER_EXTERNAL_URL
